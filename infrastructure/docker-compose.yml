version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: aegis_postgres
    environment:
      POSTGRES_USER: aegis
      POSTGRES_PASSWORD: aegispassword
      POSTGRES_DB: aegis_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  zookeeper:
    image: wurstmeister/zookeeper:latest
    container_name: aegis_zookeeper
    ports:
      - "2181:2181"
    restart: always

  kafka:
    image: wurstmeister/kafka:latest
    container_name: aegis_kafka
    ports:
      - "9094:9092"
    environment:
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9094
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
    depends_on:
      - zookeeper
    restart: always

  redis:
    image: redis:7-alpine
    container_name: aegis_redis
    ports:
      - "6379:6379"
    restart: always

  neo4j:
    image: neo4j:5.12.0
    container_name: aegis_neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/neo4jpassword
    volumes:
      - neo4j_data:/data
    restart: always

  qdrant:
    image: qdrant/qdrant:v1.6.1
    container_name: aegis_qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: always

volumes:
  postgres_data:
  neo4j_data:
  qdrant_data:
