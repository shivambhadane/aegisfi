version: '3.8'
services:
  postgres:
    image: postgres:15
    container_name: aegis_postgres
    environment:
      POSTGRES_USER: aegis
      POSTGRES_PASSWORD: aegispassword
      POSTGRES_DB: aegis_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

volumes:
  postgres_data:
